{% extends "base.html" %}

{% block content %}
<h2>Bank Statement</h2>

{% if transactions %}
<table>
    <thead>
        <tr>
            <th>Type</th>
            <th>From</th>
            <th>To</th>
            <th>Amount</th>
        </tr>
    </thead>
    <tbody>
    {% for txn in transactions %}
        <tr>
            <td>{{ txn.type }}</td>
            <td>{{ txn.sender_id }}</td>
            <td>{{ txn.recipient_id }}</td>
            <td>${{ "%.2f"|format(txn.amount) }}</td>
        </tr>
    {% endfor %}
    </tbody>
</table>
{% else %}
<p>No transactions yet.</p>
{% endif %}

{% endblock %}
