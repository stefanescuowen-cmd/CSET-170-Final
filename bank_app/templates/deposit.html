{% extends "base.html" %}

{% block content %}
<h2>Deposit Money</h2>

<form method="POST">
    <input name="card_number" placeholder="Card Number" required><br>
    <input name="expiry" placeholder="Expiry Date" required><br>
    <input name="ccv" placeholder="CCV" required><br>
    <input name="amount" placeholder="Amount" required><br>
    <button type="submit">Deposit</button>
</form>

<a href="/dashboard">Back</a>
{% endblock %}
