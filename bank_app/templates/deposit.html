{% extends "base.html" %}

{% block content %}
<h2>Deposit Money</h2>

<!-- Flash messages -->
{% with messages = get_flashed_messages(with_categories=true) %}
  {% if messages %}
    <ul class="flash-messages">
      {% for category, message in messages %}
        <li class="flash-{{ category }}">{{ message }}</li>
      {% endfor %}
    </ul>
  {% endif %}
{% endwith %}

<form action="/deposit" method="POST">
    <input name="card_number" placeholder="Card Number" required><br>
    <input name="expiry" placeholder="Expiry Date" required><br>
    <input name="ccv" placeholder="CCV" required><br>
    <input name="amount" placeholder="Amount" required><br>
    <button type="submit">Deposit</button>
</form>

<a href="/dashboard">Back to Dashboard</a>
{% endblock %}
