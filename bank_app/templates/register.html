{% extends "base.html" %}

{% block content %}
<h2>Register</h2>

<form method="POST">
    <input name="username" placeholder="Username"><br>
    <input name="first_name" placeholder="First Name"><br>
    <input name="last_name" placeholder="Last Name"><br>
    <input name="ssn" placeholder="SSN"><br>
    <input name="address" placeholder="Address"><br>
    <input name="phone" placeholder="Phone"><br>

    <!-- Password field with eye toggle -->
    <div class="password-wrapper">
        <input id="register_password" name="password" type="password" placeholder="Password" required>
        <i class="fa-solid fa-eye toggle-eye" data-target="register_password"></i>
    </div>

    <button type="submit">Register</button>
</form>
{% endblock %}
